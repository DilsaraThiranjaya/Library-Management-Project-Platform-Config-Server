server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/DilsaraThiranjaya/Library-Management-Project-Configurations.git
          search-paths: 'platform,services'
        native:
          search-locations:
            - classpath:/configurations
            - classpath:/configurations/platform
            - classpath:/configurations/services

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false